name: vfkit Smoke Test

on:
  workflow_dispatch:
    inputs:
      confirm_paid_blacksmith:
        description: Type RUN to confirm starting a paid Blacksmith macOS runner.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: vfkit-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  authorize:
    name: Authorize paid Blacksmith runner
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Require explicit confirmation
        env:
          CONFIRM_PAID_BLACKSMITH: ${{ inputs.confirm_paid_blacksmith }}
        run: |
          if [ "$CONFIRM_PAID_BLACKSMITH" != "RUN" ]; then
            echo "::error::Set confirm_paid_blacksmith to RUN to start the paid Blacksmith runner."
            exit 1
          fi

  vfkit-smoke:
    name: vfkit smoke
    needs: authorize
    runs-on: blacksmith-6vcpu-macos-latest
    timeout-minutes: 60
    env:
      ROOTCELL_INTEGRATION_PROVIDER: macos-vfkit
      ROOTCELL_STATE_DIR: ${{ runner.temp }}/rootcell-state
      XDG_CACHE_HOME: ${{ runner.temp }}/xdg-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        timeout-minutes: 2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        timeout-minutes: 10
        with:
          github_access_token: ${{ github.token }}

      - name: Install TypeScript dependencies
        timeout-minutes: 15
        run: nix shell .#hostTools --command bun install --frozen-lockfile

      - name: Clean stale vfkit smoke state
        timeout-minutes: 5
        run: nix shell .#hostTools --command bun run test:integration:teardown

      - name: Run vfkit smoke test
        timeout-minutes: 45
        run: nix shell .#hostTools --command bun run test:integration:vfkit-smoke

      - name: Teardown vfkit smoke state
        if: always()
        timeout-minutes: 5
        run: nix shell .#hostTools --command bun run test:integration:teardown
